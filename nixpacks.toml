[phases.setup]
nixPkgs = [
    "chromium",
    "nss",
    "nspr",
    "atk",
    "cups",
    "libdrm",
    "dbus",
    "libxkbcommon",
    "xorg.libX11",
    "xorg.libXcomposite",
    "xorg.libXdamage",
    "xorg.libXext",
    "xorg.libXfixes",
    "xorg.libXrandr",
    "xorg.libxcb",
    "mesa",
    "expat",
    "libxcb",
    "pango",
    "cairo",
    "alsa-lib"
]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "playwright install chromium",
    "playwright install-deps chromium"
]

[phases.build]
cmds = []

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"